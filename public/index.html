<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadGen Pro v2 - Intent Lead Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .verified { color: #10b981; }
    .unverified { color: #f59e0b; }
    .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-400 mb-2">🎯 LeadGen Pro v2</h1>
      <p class="text-gray-400">Find intent leads - people actively seeking services</p>
    </div>
    
    <!-- Search Form -->
    <div class="bg-gray-800 rounded-lg p-6 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        
        <!-- Keyword -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">Keyword</label>
          <input type="text" id="keyword" placeholder="web developer, logo design..." 
                 class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 focus:border-blue-500 focus:outline-none">
        </div>
        
        <!-- Region -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">Region</label>
          <select id="region" class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 focus:border-blue-500 focus:outline-none">
            <option value="all">All US Cities</option>
            <option value="sfbay">San Francisco</option>
            <option value="newyork">New York</option>
            <option value="losangeles">Los Angeles</option>
            <option value="chicago">Chicago</option>
            <option value="seattle">Seattle</option>
            <option value="boston">Boston</option>
            <option value="austin">Austin</option>
            <option value="denver">Denver</option>
            <option value="miami">Miami</option>
            <option value="atlanta">Atlanta</option>
            <option value="dallas">Dallas</option>
            <option value="phoenix">Phoenix</option>
          </select>
        </div>
        
        <!-- Max Results -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">Max Results</label>
          <select id="maxResults" class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 focus:border-blue-500 focus:outline-none">
            <option value="10">10 leads</option>
            <option value="25">25 leads</option>
            <option value="50" selected>50 leads</option>
            <option value="100">100 leads</option>
          </select>
        </div>
        
        <!-- Search Button -->
        <div class="flex items-end">
          <button id="searchBtn" onclick="startSearch()" 
                  class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
            🔍 Search Leads
          </button>
        </div>
      </div>
    </div>
    
    <!-- AI Console -->
    <div id="statusBar" class="hidden bg-gray-800 rounded-lg p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center">
          <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-green-500 mr-3"></div>
          <span class="text-green-400 font-bold">🤖 AI Console</span>
        </div>
        <span id="statusText" class="text-gray-300"></span>
      </div>
      <div id="logContainer" class="bg-black rounded p-3 text-sm text-green-400 max-h-48 overflow-y-auto font-mono border border-green-900">
        <div class="text-gray-500">// AI processing logs will appear here...</div>
      </div>
      <div class="mt-3 grid grid-cols-4 gap-2 text-center text-xs">
        <div class="bg-gray-700 rounded p-2">
          <div class="text-gray-400">Cities Scraped</div>
          <div id="stat-cities" class="text-xl font-bold text-blue-400">0</div>
        </div>
        <div class="bg-gray-700 rounded p-2">
          <div class="text-gray-400">Posts Analyzed</div>
          <div id="stat-posts" class="text-xl font-bold text-yellow-400">0</div>
        </div>
        <div class="bg-gray-700 rounded p-2">
          <div class="text-gray-400">Contacts Found</div>
          <div id="stat-contacts" class="text-xl font-bold text-green-400">0</div>
        </div>
        <div class="bg-gray-700 rounded p-2">
          <div class="text-gray-400">Emails Verified</div>
          <div id="stat-verified" class="text-xl font-bold text-purple-400">0</div>
        </div>
      </div>
    </div>
    
    <!-- Contact Type Filters -->
    <div id="filterBar" class="hidden bg-gray-800 rounded-lg p-4 mb-4">
      <div class="flex flex-wrap gap-3 items-center">
        <span class="text-gray-400">Filter by:</span>
        <button onclick="filterLeads('all')" class="filter-btn active px-3 py-1 rounded bg-blue-600 text-sm" data-filter="all">
          All (<span id="count-all">0</span>)
        </button>
        <button onclick="filterLeads('email')" class="filter-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-filter="email">
          📧 Email (<span id="count-email">0</span>)
        </button>
        <button onclick="filterLeads('phone')" class="filter-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-filter="phone">
          📞 Phone (<span id="count-phone">0</span>)
        </button>
        <button onclick="filterLeads('whatsapp')" class="filter-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-filter="whatsapp">
          💬 WhatsApp (<span id="count-whatsapp">0</span>)
        </button>
        
        <div class="ml-auto">
          <button onclick="exportLeads()" class="px-4 py-1 rounded bg-green-600 hover:bg-green-700 text-sm">
            📥 Export Excel
          </button>
        </div>
      </div>
    </div>
    
    <!-- Results Table -->
    <div class="bg-gray-800 rounded-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-700">
          <tr>
            <th class="px-4 py-3 text-left text-sm">#</th>
            <th class="px-4 py-3 text-left text-sm">Name</th>
            <th class="px-4 py-3 text-left text-sm">Contact</th>
            <th class="px-4 py-3 text-left text-sm">Need</th>
            <th class="px-4 py-3 text-left text-sm">Budget</th>
            <th class="px-4 py-3 text-left text-sm">City</th>
            <th class="px-4 py-3 text-left text-sm">Link</th>
          </tr>
        </thead>
        <tbody id="resultsTable">
          <tr>
            <td colspan="7" class="px-4 py-8 text-center text-gray-500">
              Enter a keyword and click Search to find leads
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
  </div>
  
  <script>
    let allLeads = [];
    let currentFilter = 'all';
    let stats = { cities: 0, posts: 0, contacts: 0, verified: 0 };
    
    async function startSearch() {
      const keyword = document.getElementById('keyword').value.trim();
      if (!keyword) {
        alert('Please enter a keyword');
        return;
      }
      
      const region = document.getElementById('region').value;
      const maxResults = parseInt(document.getElementById('maxResults').value);
      
      // Reset
      allLeads = [];
      stats = { cities: 0, posts: 0, contacts: 0, verified: 0 };
      document.getElementById('resultsTable').innerHTML = '';
      document.getElementById('statusBar').classList.remove('hidden');
      document.getElementById('filterBar').classList.add('hidden');
      document.getElementById('logContainer').innerHTML = '<div class="text-green-500">🚀 Starting AI-powered lead search...</div>';
      document.getElementById('searchBtn').disabled = true;
      document.getElementById('searchBtn').textContent = '⏳ Searching...';
      updateStats();
      
      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, region, maxResults })
        });
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const text = decoder.decode(value);
          const lines = text.split('\n');
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = JSON.parse(line.slice(6));
              handleEvent(data);
            }
          }
        }
        
      } catch (error) {
        console.error('Search error:', error);
        addLog('Error: ' + error.message);
      }
      
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = '🔍 Search Leads';
    }
    
    function handleEvent(data) {
      switch (data.type) {
        case 'status':
          document.getElementById('statusText').textContent = data.message;
          break;
        
        case 'log':
          // Handle detailed logs from backend
          const levelColors = {
            brightdata: 'cyan',
            ai: 'purple',
            hunter: 'blue',
            success: 'green',
            warning: 'yellow',
            error: 'red',
            reject: 'red',
            info: 'white'
          };
          addLog(data.message, levelColors[data.level] || 'white');
          
          // Update stats based on log type
          if (data.level === 'brightdata' && data.message.includes('Successfully scraped')) {
            stats.cities++;
          }
          if (data.level === 'ai' && data.message.includes('Analyzing post')) {
            stats.posts++;
          }
          if (data.level === 'hunter' && data.message.includes('VERIFIED')) {
            stats.verified++;
          }
          updateStats();
          break;
          
        case 'lead':
          allLeads.push(data.lead);
          stats.contacts++;
          renderLead(data.lead);
          updateCounts();
          updateStats();
          break;
          
        case 'complete':
          document.getElementById('filterBar').classList.remove('hidden');
          updateCounts();
          addLog(``, 'green');
          addLog(`═══════════════════════════════════════════`, 'green');
          addLog(`🎉 SEARCH COMPLETE!`, 'green');
          addLog(`📊 Total Leads: ${data.total}`, 'green');
          addLog(`📧 With Email: ${data.byType?.email || 0} verified`, 'green');
          addLog(`📞 With Phone: ${data.byType?.phone || 0}`, 'green');
          addLog(`💬 With WhatsApp: ${data.byType?.whatsapp || 0}`, 'green');
          addLog(`🌐 Website Only: ${data.byType?.website || 0}`, 'yellow');
          addLog(`═══════════════════════════════════════════`, 'green');
          
          // Keep console visible but stop spinner
          document.querySelector('#statusBar .animate-spin')?.classList.add('hidden');
          document.getElementById('searchBtn').disabled = false;
          document.getElementById('searchBtn').textContent = '🔍 Search Leads';
          break;
      }
    }
    
    function updateStats() {
      document.getElementById('stat-cities').textContent = stats.cities;
      document.getElementById('stat-posts').textContent = stats.posts;
      document.getElementById('stat-contacts').textContent = stats.contacts;
      document.getElementById('stat-verified').textContent = stats.verified;
    }
    
    function addLog(message, color = 'green') {
      const container = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const colors = {
        green: 'text-green-400',
        blue: 'text-blue-400',
        yellow: 'text-yellow-400',
        cyan: 'text-cyan-400',
        gray: 'text-gray-500',
        white: 'text-gray-300',
        red: 'text-red-400',
        purple: 'text-purple-400'
      };
      const colorClass = colors[color] || colors.green;
      container.innerHTML += `<div class="${colorClass}">[${time}] ${message}</div>`;
      container.scrollTop = container.scrollHeight;
    }
    
    function renderLead(lead) {
      const table = document.getElementById('resultsTable');
      
      // Remove placeholder if exists
      if (table.querySelector('td[colspan]')) {
        table.innerHTML = '';
      }
      
      const contactHtml = getContactHtml(lead);
      
      const row = document.createElement('tr');
      row.className = `border-t border-gray-700 lead-row lead-type-${lead.contactType}`;
      row.innerHTML = `
        <td class="px-4 py-3 text-sm">${lead.id}</td>
        <td class="px-4 py-3 text-sm font-medium">${escapeHtml(lead.name)}</td>
        <td class="px-4 py-3 text-sm">${contactHtml}</td>
        <td class="px-4 py-3 text-sm text-gray-300">${escapeHtml(lead.description || lead.title).substring(0, 60)}...</td>
        <td class="px-4 py-3 text-sm">${lead.budget ? '$' + lead.budget : '-'}</td>
        <td class="px-4 py-3 text-sm text-gray-400">${lead.city}</td>
        <td class="px-4 py-3 text-sm">
          <a href="${lead.url}" target="_blank" class="text-blue-400 hover:text-blue-300">🔗 View</a>
        </td>
      `;
      table.appendChild(row);
    }
    
    function getContactHtml(lead) {
      let html = '';
      
      if (lead.email) {
        const verifiedClass = lead.emailVerified ? 'verified' : 'unverified';
        const icon = lead.emailVerified ? '✅' : '⚠️';
        html += `<div class="${verifiedClass}">📧 ${icon} ${lead.email}</div>`;
      }
      
      if (lead.phone) {
        html += `<div>📞 ${lead.phone}</div>`;
      }
      
      if (lead.whatsapp) {
        html += `<div>💬 ${lead.whatsapp}</div>`;
      }
      
      if (!html) {
        html = '<span class="text-gray-500">Website only</span>';
      }
      
      return html;
    }
    
    function updateCounts() {
      document.getElementById('count-all').textContent = allLeads.length;
      document.getElementById('count-email').textContent = allLeads.filter(l => l.contactType === 'email').length;
      document.getElementById('count-phone').textContent = allLeads.filter(l => l.contactType === 'phone').length;
      document.getElementById('count-whatsapp').textContent = allLeads.filter(l => l.contactType === 'whatsapp').length;
    }
    
    function filterLeads(type) {
      currentFilter = type;
      
      // Update button styles
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600');
        btn.classList.add('bg-gray-700');
      });
      document.querySelector(`[data-filter="${type}"]`).classList.remove('bg-gray-700');
      document.querySelector(`[data-filter="${type}"]`).classList.add('bg-blue-600');
      
      // Filter rows
      document.querySelectorAll('.lead-row').forEach(row => {
        if (type === 'all') {
          row.style.display = '';
        } else {
          row.style.display = row.classList.contains(`lead-type-${type}`) ? '' : 'none';
        }
      });
    }
    
    function exportLeads() {
      const filteredLeads = currentFilter === 'all' 
        ? allLeads 
        : allLeads.filter(l => l.contactType === currentFilter);
      
      if (filteredLeads.length === 0) {
        alert('No leads to export');
        return;
      }
      
      // Create CSV
      const headers = ['Name', 'Email', 'Email Verified', 'Phone', 'WhatsApp', 'Description', 'Budget', 'City', 'Source', 'URL', 'Posted Date'];
      const rows = filteredLeads.map(l => [
        l.name,
        l.email || '',
        l.emailVerified ? 'Yes' : 'No',
        l.phone || '',
        l.whatsapp || '',
        l.description || l.title,
        l.budget || '',
        l.city,
        l.source,
        l.url,
        l.postedDate || ''
      ]);
      
      const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      
      // Download
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `leads_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
